<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página 4</title>
    <style>
        body {
            background: #000; color: white; margin: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; overflow: hidden; cursor: pointer; user-select: none;
        }
        .instrucao { position: fixed; top: 20px; left: 20px; font-size: 11px; color: rgba(255,255,255,0.3); }
        #container { text-align: center; width: 85%; position: relative; }
        .item {
            display: none; font-size: 28px; font-weight: bold; opacity: 0;
            transition: opacity 0.8s ease; width: 100%;
        }
        .item.active { display: block; }
        img { width: 100%; max-width: 280px; border-radius: 15px; margin: 20px auto; border: 1px solid rgba(255,255,255,0.2); }
        button { background: white; color: black; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body onclick="proxima()">
    <div class="instrucao">clique na tela</div>
    <div id="container">
        <div class="item active" style="opacity: 1;">Aquela pulseirinha pode parecer simples...</div>
        <div class="item">Mas pra mim significou muito.</div>
        <div class="item"><img src="pulseira.jpeg"></div>
        <div class="item">E eu nunca esqueci daquele dia...</div>
        <div class="item">dos dois rostinhos na mão.</div>
        <div class="item"><img src="ROSTOS.jpeg"></div>
        <div class="item">
            <button onclick="window.location.href='pagina5.html'">Continuar</button>
        </div>
    </div>

    <script>
        let i = 0;
        const itens = document.querySelectorAll(".item");
        function proxima() {
            if (i >= itens.length - 1) return;
            itens[i].classList.remove("active");
            itens[i].style.opacity = 0;
            i++;
            setTimeout(() => {
                itens[i].classList.add("active");
                setTimeout(() => { itens[i].style.opacity = 1; }, 50);
            }, 100);
        }
    </script>
</body>
</html>
