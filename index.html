<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Você ❤️</title>
    <style>
        body {
            background: #000; color: white; margin: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; overflow: hidden; cursor: pointer; user-select: none;
        }
        .instrucao {
            position: fixed; top: 20px; left: 20px; font-size: 11px;
            color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase;
        }
        #texto {
            font-size: 32px; font-weight: bold; text-align: center;
            max-width: 80%; transition: opacity 0.5s ease;
        }
    </style>
</head>
<body onclick="proxima()">
    <div class="instrucao">clique na tela</div>
    <div id="texto">CLIQUE NA TELA PRA COMEÇAR</div>

    <script>
        let frases = [
            "Antes de qualquer coisa...", "Eu preciso falar sobre você.",
            "Sobre o quanto você é linda.", "Seu sorriso prende...",
            "Seu olhar bagunça tudo aqui dentro.", "E quanto mais eu te observo...",
            "Mais eu percebo que você é diferente."," Sua beleza externa encanta, mas é o seu coração que faz qualquer um se apaixonar pelo que você é por dentro.",
            "Você é prova viva de que a verdadeira beleza não está só no que se vê, mas no que se sente quando estamos perto de alguém tão especial como você.",
            "Você é linda, e o mais lindo ainda é que isso consegue ser apenas um detalhe diante de tantas outras qualidades que vejo em você.",
            "Todos os dias meu coração te escolhe, e não teria como ser diferente diante de tantas qualidades que me faz perceber. 🥰",
        ];
        let i = 0;
        function proxima() {
            let t = document.getElementById("texto");
            if (i < frases.length) {
                t.style.opacity = 0;
                setTimeout(() => {
                    t.innerText = frases[i];
                    t.style.opacity = 1;
                    i++;
                }, 500);
            } else {
                window.location.href = "pagina2.html";
            }
        }
    </script>
</body>
</html>
